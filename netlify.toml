[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[functions."generate-ebook"]
  timeout = 60

[functions."generate-image"]
  timeout = 30

[functions."chat"]
  timeout = 30
